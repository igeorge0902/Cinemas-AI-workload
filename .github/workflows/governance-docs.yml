name: Governance Docs and Naming Checks

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  governance-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set base and head SHAs
        id: shas
        shell: bash
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          if [ -z "$BASE_SHA" ]; then
            BASE_SHA="${{ github.event.before }}"
          fi
          if [ -z "$BASE_SHA" ]; then
            BASE_SHA="HEAD~1"
          fi
          echo "base=$BASE_SHA" >> "$GITHUB_OUTPUT"
          echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Naming lint
        run: |
          python k8infra/ci/lint_governance_names.py --base "${{ steps.shas.outputs.base }}" --head "${{ steps.shas.outputs.head }}"

      - name: Doc drift check
        run: |
          python k8infra/ci/check_doc_drift.py --base "${{ steps.shas.outputs.base }}" --head "${{ steps.shas.outputs.head }}"

