schema_version: 2
agents:
  - name: backend-dev
    scope:
      - quarkus
      - java
      - rest-api
    vocabulary:
      - endpoint
      - dto
      - service
      - repository
      - transaction
      - pagination
    direct_tasks:
      - task: add or update rest endpoints
        trigger: intent_match
        priority: medium
      - task: implement service-layer business rules
        trigger: intent_match
        priority: medium
      - task: fix api validation and error mapping
        trigger: incident
        priority: high
      - task: wire downstream client calls and headers
        trigger: intent_match
        priority: medium
      - task: add backend unit/integration tests
        trigger: intent_match
        priority: medium

  - name: devops
    scope:
      - kubernetes
      - ci-cd
      - observability
    vocabulary:
      - deployment
      - ingress
      - rollout
      - pipeline
      - helm
      - autoscaling
    direct_tasks:
      - task: update k8s manifests and service exposure
        trigger: intent_match
        priority: medium
      - task: improve ci-cd build and release pipelines
        trigger: intent_match
        priority: medium
      - task: troubleshoot pod crashes and rollout issues
        trigger: incident
        priority: high
      - task: configure metrics, logs, and tracing
        trigger: intent_match
        priority: medium
      - task: harden runtime config and secret handling
        trigger: incident
        priority: high

  - name: ios-dev
    scope:
      - swift
      - ios
      - ui
    vocabulary:
      - swiftui
      - uikit
      - urlsession
      - async-await
      - navigation
      - keychain
    direct_tasks:
      - task: build or refactor ios screens
        trigger: intent_match
        priority: medium
      - task: implement api client calls and decoding
        trigger: intent_match
        priority: medium
      - task: improve state handling and navigation flow
        trigger: intent_match
        priority: medium
      - task: fix mobile-specific auth/session issues
        trigger: incident
        priority: high
      - task: add ios unit/ui tests
        trigger: intent_match
        priority: medium

  - name: database-dev
    scope:
      - sql
      - mysql
      - schema
    vocabulary:
      - migration
      - index
      - join
      - trigger
      - stored-procedure
      - transaction
    direct_tasks:
      - task: design or update schema objects
        trigger: intent_match
        priority: medium
      - task: optimize slow queries and indexes
        trigger: incident
        priority: high
      - task: maintain triggers and stored procedures
        trigger: intent_match
        priority: medium
      - task: create data backfill or repair scripts
        trigger: incident
        priority: high
      - task: validate data integrity and constraints
        trigger: incident
        priority: high

  - name: frontend-dev
    scope:
      - react
      - angular
      - css
    vocabulary:
      - component
      - route
      - state
      - template
      - form-validation
      - accessibility
    direct_tasks:
      - task: implement ui components and pages
        trigger: intent_match
        priority: medium
      - task: wire frontend routes and navigation
        trigger: intent_match
        priority: medium
      - task: add form validation and inline feedback
        trigger: intent_match
        priority: medium
      - task: integrate frontend with backend endpoints
        trigger: intent_match
        priority: medium
      - task: fix styling and responsive layout issues
        trigger: incident
        priority: low

  - name: testing-engineer
    scope:
      - unit-testing
      - integration-testing
      - e2e-testing
    vocabulary:
      - test-case
      - assertion
      - mock
      - fixture
      - regression
      - coverage
    direct_tasks:
      - task: create and maintain test suites
        trigger: intent_match
        priority: medium
      - task: add mocks, fixtures, and test data
        trigger: intent_match
        priority: medium
      - task: reproduce bugs and add regression tests
        trigger: incident
        priority: high
      - task: improve flaky test stability
        trigger: incident
        priority: high
      - task: report coverage gaps and risk areas
        trigger: intent_match
        priority: medium

  - name: security-specialist
    scope:
      - application-security
      - network-security
      - data-security
    vocabulary:
      - threat-model
      - cve
      - encryption
      - hmac
      - secrets
      - least-privilege
    direct_tasks:
      - task: review auth and authorization flows
        trigger: incident
        priority: high
      - task: scan dependencies and remediate cves
        trigger: incident
        priority: high
      - task: harden headers, cookies, and transport settings
        trigger: incident
        priority: high
      - task: validate secret storage and rotation strategy
        trigger: intent_match
        priority: high
      - task: test for common vulnerability classes
        trigger: intent_match
        priority: high

  - name: performance-engineer
    scope:
      - performance-testing
      - load-testing
      - stress-testing
    vocabulary:
      - latency
      - throughput
      - bottleneck
      - profiling
      - caching
      - concurrency
    direct_tasks:
      - task: benchmark critical request paths
        trigger: intent_match
        priority: medium
      - task: profile cpu, memory, and io hot spots
        trigger: incident
        priority: high
      - task: tune query/service/cache performance
        trigger: incident
        priority: high
      - task: design load and stress test scenarios
        trigger: intent_match
        priority: medium
      - task: define and track performance budgets
        trigger: intent_match
        priority: medium

  - name: ai-researcher
    scope:
      - machine-learning
      - deep-learning
      - natural-language-processing
    vocabulary:
      - dataset
      - embedding
      - fine-tuning
      - inference
      - evaluation
      - prompt
    direct_tasks:
      - task: define experiments and success metrics
        trigger: intent_match
        priority: medium
      - task: compare model or prompt variants
        trigger: intent_match
        priority: medium
      - task: prepare datasets and evaluation sets
        trigger: intent_match
        priority: medium
      - task: analyze model output quality and drift
        trigger: incident
        priority: high
      - task: document findings and recommendations
        trigger: intent_match
        priority: low

  - name: business-analyst
    scope:
      - requirements-gathering
      - process-modeling
      - stakeholder-alignment
    vocabulary:
      - user-story
      - acceptance-criteria
      - workflow
      - kpi
      - dependency
      - risk
    direct_tasks:
      - task: refine requirements into clear stories
        trigger: intent_match
        priority: medium
      - task: write testable acceptance criteria
        trigger: intent_match
        priority: high
      - task: map process flows and edge cases
        trigger: intent_match
        priority: medium
      - task: prioritize backlog by value and risk
        trigger: intent_match
        priority: medium
      - task: align scope across stakeholders
        trigger: intent_match
        priority: medium

  - name: cpp-developer
    # Canonical handle; legacy @c++ developer mention is deprecated.
    scope:
      - c++
      - systems-programming
      - performance-critical-code
    vocabulary:
      - raii
      - stl
      - smart-pointer
      - template
      - undefined-behavior
      - move-semantics
    direct_tasks:
      - task: implement core c++ features and modules
        trigger: intent_match
        priority: medium
      - task: fix ownership and memory safety bugs
        trigger: incident
        priority: high
      - task: optimize cpu and memory performance
        trigger: incident
        priority: high
      - task: improve template and build diagnostics
        trigger: intent_match
        priority: medium
      - task: add unit tests for low-level behavior
        trigger: intent_match
        priority: medium
