# Naming Conventions & Key Identifiers
# Quick reference for consistent naming across codebase
# Last Updated: April 5, 2026

---

# Package Structure & Naming

packages:

  backend_services:
    dalogin:
      base: "com.dalogin"
      subpackages:
        filters: "com.dalogin.filters"           # CookieFilter, CiphertextFilter, RequestFilter, etc.
        servlets: "com.dalogin.servlets"         # HelloWorld, CheckOut, GetAllPurchases, etc.
        client: "com.dalogin.client"             # ServiceClient, Purchases interface
        listeners: "com.dalogin.listeners"       # CustomServletContextListener, CustomHttpSessionListener
        utils: "com.dalogin.utils"               # HMAC, AES, Email utilities

    mbooks:
      base: "com.jeet"
      subpackages:
        rest: "com.jeet.rest"                    # BookController (1170+ lines)
        service: "com.jeet.service"              # PaymentService, TicketService
        booking: "com.jeet.booking"              # BookingHandlerImpl, seat reservation logic
        db: "com.jeet.db"                        # DAO, HibernateUtil, entity access
        broadcasting: "com.jeet.broadcasting"    # KafkaListener, WebSocketServer
        api: "com.jeet.api"                      # Entity classes (Movie, Venue, Seat, Ticket, Purchase, etc.)

    mbook:
      base: "com.jeet"
      similar_to: "mbooks (same base package for compatibility)"
      subpackages:
        rest: "com.jeet.rest"                    # UserController, DeviceController
        db: "com.jeet.db"                        # DAO (CDI-injected)

    simple_service_webapp:
      base: "com.simple"
      subpackages:
        rest: "com.simple.rest"                  # ImageResource

---

# HTTP Headers (IMMUTABLE - DO NOT CHANGE)

http_headers:

  authentication:
    X-Token:
      description: "Session token"
      type: "Header"
      format: "UUID-like string (40+ chars)"
      set_by: "dalogin /HelloWorld response"
      note: "✓ HARDCODED: iOS client depends on exact name"

    X-HMAC-HASH:
      description: "HMAC-SHA512 signature"
      type: "Header"
      format: "base64(hmac_sha512_bytes)"
      set_by: "Client (iOS or web)"
      note: "✓ HARDCODED: iOS + Web both use this exact name"

    X-Device:
      description: "Device identifier"
      type: "Header"
      format: "String (UUID or fingerprint)"
      set_by: "Client"
      note: "✓ HARDCODED: mbooks uses for seat lock attribution"

    X-Micro-Time:
      description: "Client timestamp"
      type: "Header"
      format: "milliseconds (long)"
      set_by: "Client"
      note: "✓ HARDCODED: Used in HMAC calculation"

    uuid:
      description: "User UUID"
      type: "Header"
      format: "String"
      set_by: "Client"
      note: "✓ HARDCODED: mbooks uses for purchase tracking"

    Ciphertext:
      description: "Encrypted request body (iOS only)"
      type: "Header"
      format: "Encrypted string"
      set_by: "iOS client"
      note: "✓ HARDCODED: dalogin CiphertextFilter checks this"

    token2:
      description: "Encrypted token (internal)"
      type: "Header"
      format: "AES-encrypted string"
      set_by: "dalogin"
      used_by: "ServiceClient for downstream requests"
      note: "✓ HARDCODED: Internal contract between dalogin/mbooks"

    TIME_:
      description: "Server timestamp for HMAC validation"
      type: "Header"
      format: "milliseconds (long)"
      set_by: "dalogin"
      note: "✓ HARDCODED: Underscore suffix is intentional"

    XSRF-TOKEN:
      description: "CSRF protection token"
      type: "Header + Cookie"
      format: "AES-encrypted"
      set_by: "dalogin /CheckOut GET"
      read_by: "/CheckOut POST (must echo back)"
      note: "✓ HARDCODED: Web UI and iOS must implement"

  response_headers:
    APIKEY:
      description: "Braintree session token (web UI cache key)"
      type: "Response Header"
      format: "Token string"
      set_by: "mbooks /payment/clientToken GET"
      read_by: "Web UI (stores in localStorage)"
      note: "✓ HARDCODED: Web UI depends on exact name"

---

# Database Schema Names (IMMUTABLE)

databases:

  login_:
    name: "login_"
    note: "Underscore suffix is INTENTIONAL (historical WildFly naming)"
    used_by:
      - dalogin (primary)
      - mbook (read-only via dalogin proxy)
      - mbooks (read-only via dalogin proxy)
    tables:
      user_: "User credentials"
      device_: "Connected devices"
      session_login: "Active sessions"
      voucher_: "User vouchers/activation"

  book:
    name: "book"
    used_by:
      - mbooks (direct access with pessimistic locking)
    tables:
      movie: "Movie catalog"
      venue: "Cinema venues"
      screen: "Screening rooms"
      screening_date: "Showtimes"
      seat: "Seat inventory"
      ticket: "Booked tickets"
      purchase: "Purchase orders"

---

# URL Paths (IMMUTABLE - iOS client depends on these)

url_paths:

  dalogin:
    /login/HelloWorld: "HMAC login (POST)"
    /login/CheckOut: "Payment gateway proxy (GET/POST)"
    /login/GetAllPurchases: "Get purchases list (GET)"
    /login/ManagePurchases: "View/cancel/delete tickets (GET/POST)"
    /login/logout: "Destroy session (GET)"
    /login/admin: "Active sessions list (GET)"
    /login/film-review/: "Web UI SPA root"

  mbooks:
    /mbooks-1/rest/book/movies: "List movies (GET, public)"
    /mbooks-1/rest/book/locations: "List venues (GET, public)"
    /mbooks-1/rest/book/venue/v2/{movieId}: "Venues for movie (GET, HMAC)"
    /mbooks-1/rest/book/venue/movies: "Movies at venue (GET, public)"
    /mbooks-1/rest/book/dates/{locationId}/{movieId}: "Screening dates (GET, HMAC)"
    /mbooks-1/rest/book/seats/{screeningDateId}: "Seat map (GET, HMAC)"
    /mbooks-1/rest/book/payment/clientToken: "Braintree token (GET, session)"
    /mbooks-1/rest/book/payment/fullcheckout2: "Execute payment (POST, session)"
    /mbooks-1/rest/book/purchases: "User purchases (GET, session)"
    /mbooks-1/rest/book/purchases/tickets: "Tickets for purchase (GET, session)"
    /mbooks-1/rest/book/managepurchases: "Cancel tickets (POST, session)"
    /mbooks-1/rest/book/deletepurchases: "Delete purchase (POST, session)"
    /mbooks-1/ws: "WebSocket (Upgrade)"

  mbook:
    /mbook-1/rest/user/profile: "User profile (GET, HMAC)"
    /mbook-1/rest/device/list: "Connected devices (GET, HMAC)"
    /mbook-1/ws: "WebSocket (Upgrade)"

  simple_service_webapp:
    /simple-service-webapp/rest/images/movie/{movieId}: "Movie poster (GET, public)"
    /simple-service-webapp/rest/images/venue/{venueId}: "Venue photo (GET, public)"
    /simple-service-webapp/rest/images/*: "Generic image (GET, public)"

