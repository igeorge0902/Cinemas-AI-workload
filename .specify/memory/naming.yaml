# DAO Method Names (Naming Pattern)

dao_methods:

  read_methods:
    getAllMovies(): "Fetch all movies (query-cached)"
    getVenuesForMovie(movieId): "Venues screening movie"
    getScreeningDatesForMovieOnVenue(locationId, movieId): "Showtimes"
    getSeatsForScreening(screeningDateId): "Seat map (NOT cached)"
    getTicketsForPurchase(purchaseId): "Tickets in purchase"
    getPurchasesForUser(uuid): "User's purchase history"
    getLocationForVenue(venueId): "Location of venue"

  write_methods:
    bookTickets(uuid, screeningDateId, seats): "Reserve seats + create tickets"
    cancelTicket(ticketIds, purchaseId): "Cancel specific tickets"
    deletePurchase(purchaseId): "Delete entire purchase"
    insertNewScreen(movieId, venueId, screenId, category): "Admin: add screening"
    updateTicketStatus(ticketId, status): "Update ticket state"

---

# Cache Region Names

cache_regions:

  read_write_cached:
    movies: "Movie catalog (read-write strategy)"
    venues: "Venue lookups (read-write)"
    location: "Location data (read-write)"
    ticket: "Ticket entities (read-write)"

  not_cached:
    Seat: "❌ Deliberately uncached (freshness critical)"
    ScreeningDate: "❌ Not query-cached (availability freshness)"
    Screen: "❌ Intermediate entity"
    Purchase: "❌ Entity not cached (query-cached only)"

