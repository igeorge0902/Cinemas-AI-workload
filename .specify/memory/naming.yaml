# File Naming Conventions

files:

  java_classes:
    pattern: "PascalCase (e.g., BookController.java, PaymentService.java)"
    test_classes: "Test*.java or *Test.java (e.g., TestNavigations.java)"
    page_objects: "PageObject naming + descriptive suffix (e.g., MoviesPage.java)"

  web_ui:
    templates: "kebab-case (e.g., dates.html, checkout.html, purchase-detail.html)"
    javascript: "app.js (single controller file, 683 lines)"
    css: "inline in index.html (light/dark theme)"

  ios:
    files: "PascalCase + .swift (e.g., APIClient.swift, URLManager.swift)"
    directories: "Logical grouping (Networking/, Views/, Models/, etc.)"

  kubernetes:
    manifests: "quarkus-backend.yaml (primary), kubernetes.yaml (legacy WildFly)"
    config_maps: "proxy-config, prometheus-config, tempo-config"

