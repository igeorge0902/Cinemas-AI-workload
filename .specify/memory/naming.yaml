# Service-to-Service Communication Names

service_contracts:

  dalogin_to_mbooks:
    header_injection: "ServiceClient adds X-Token, Ciphertext, uuid, TIME_"
    request_path: "/mbooks-1/rest/book/..." (via Apache proxy)
    response_parsing: "JSONObject or @JsonProperty annotations"

  ios_to_backend:
    hmac_fields: "X-HMAC-HASH, X-Micro-Time, X-Device, uuid"
    session_fields: "X-Token (in Authorization header or cookie)"
    body_format: "form-urlencoded for /CheckOut, JSON for others"

  web_ui_to_backend:
    hmac_transform: "AngularJS $http interceptor (transformRequest)"
    cache_key: "APIKEY header (cached in localStorage)"
