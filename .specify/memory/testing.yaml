# Test Execution Procedures

procedures:

  unit_test_execution:
    step_1_prerequisites: |
      - Ensure MySQL is running with schemas seeded
      - Set WILDFLY_URL env var if needed

    step_2_run_tests: |
      IDE: Right-click test class → Run
      CLI: mvn test -f {service}/pom.xml
      Settings: Use k8infra/settings-local.xml for proxy bypass

    step_3_verify_results: |
      All tests should PASS
      Code coverage: Aim for > 70% on critical paths (auth, payment)

  integration_test_execution:
    step_1_deploy_backend: |
      kubectl apply -f k8infra/quarkus-backend.yaml
      kubectl wait --for=condition=ready pod -l app=dalogin -n default

    step_2_seed_database: |
      kubectl exec mysql-0 -- mysql -uroot -prootpw < mysql_8/login.sql
      kubectl exec mysql-0 -- mysql -uroot -prootpw < mysql_8/book.sql

    step_3_start_tunnel: |
      sudo minikube tunnel &  (keep running)

    step_4_run_tests: |
      python3 k8infra/test-login.py
      python3 k8infra/test-login-admin.py

    step_5_verify_results: |
      Both tests should complete with "PASS" messages

  appium_ui_test_execution:
    step_1_prerequisites: |
      - Xcode installed
      - iOS simulator running (iPhone 16 Pro, iOS 26.1)
      - minikube tunnel running
      - Backend services deployed + seeded

    step_2_launch_app: |
      Open Xcode → SwiftCinemas.xcodeproj
      Set build target to iPhone 16 Pro simulator
      Build & Run (Cmd+R)

    step_3_start_appium: |
      appium --port 4723 &  (or use IDE launcher)

    step_4_run_tests: |
      IDE: Right-click TestNavigations.java → Run as TestNG
      CLI: mvn test -f appium/pom.xml
      Direct: java -cp ... org.testng.TestNG testng.xml

    step_5_debug_failures: |
      Run InspectUI: testng-inspect.xml
      Examine page-source XML for selector updates
      Update page object classes as needed

  load_test_execution:
    step_1_prepare_jmeter: |
      jmeter -t API2.jmx &  (GUI mode)
      or
      jmeter -n -t API2.jmx -l results.jtl  (headless)

    step_2_configure_threads: |
      Set thread count (10, 100, or 300)
      Adjust ramp-up time
      Set duration

    step_3_run_test: |
      Click "Start" or run headless command
      Monitor real-time graphs

    step_4_analyze_results: |
      Check average response time < 500ms
      Verify error rate < 0.1%
      Review p95 latency

---

# Continuous Integration (CI)

ci_pipeline:

  github_actions:
    config_file: ".github/workflows/ (if added)"
    triggers:
      - "Push to main branch"
      - "Pull request opened"
    jobs:
      - name: "build"
        runs_on: "ubuntu-latest"
        steps:
          - "Checkout code"
          - "Setup JDK 17"
          - "Build all services"
          - "Run unit tests"

      - name: "integration"
        runs_on: "ubuntu-latest"
        services:
          - "MySQL"
          - "Kafka"
        steps:
          - "Deploy services to kind cluster"
          - "Run integration tests"

      - name: "appium"
        runs_on: "macos-latest"
        steps:
          - "Setup iOS simulator"
          - "Launch Appium"
          - "Run UI tests"

  artifact_uploads:
    test_reports: "TestNG reports (HTML)"
    coverage_reports: "JaCoCo coverage XML"
    load_test_results: "JMeter .jtl files"

---

# Debugging & Troubleshooting

troubleshooting:

  unit_test_failures:
    database_connection_error: |
      - Verify MySQL is running
      - Check datasource URL in application.properties
      - Ensure schema is created and seeded

    null_pointer_exception: |
      - Check @Inject fields are properly initialized
      - Verify CDI bean scope (@ApplicationScoped, @RequestScoped)

    assertion_failures: |
      - Add System.out.println() for debugging
      - Use debugger breakpoints in IDE

  appium_failures:
    element_not_found: |
      - Run InspectUI to get fresh page source
      - Update selector in page object class
      - Verify element is actually visible before interaction

    timeout_waiting_for_element: |
      - Increase wait timeout in test
      - Verify backend is responsive (curl test)
      - Check app didn't crash (view Xcode log)

    connection_refused_error: |
      - Verify Appium server running (port 4723)
      - Check backend services accessible
      - Confirm sudo minikube tunnel is active

  jmeter_issues:
    zero_throughput: |
      - Check server is actually responding (manual curl test)
      - Verify thread count is > 0
      - Check duration hasn't expired

    all_requests_failing: |
      - Verify backend services running
      - Check HMAC signature calculation
      - Review BeanShell processor logic

