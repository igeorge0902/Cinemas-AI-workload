# Testing Reference: Cinemas Project
# Test suites, configurations, and procedures
# Last Updated: April 5, 2026

---

# Test Frameworks & Tools

frameworks:

  java_unit_tests:
    framework: "Quarkus @QuarkusTest"
    version: "Quarkus 3.19.4"
    dependency: "quarkus-junit5"
    runner: "JUnit 5 (Jupiter)"
    features:
      - "CDI injection (@Inject)"
      - "Real database access (testcontainers or embedded)"
      - "Transaction support"
    example_classes:
      - "dalogin-quarkus/src/test/java/com/dalogin/LoginFlowTest.java"
      - "mbooks-quarkus/src/test/java/com/jeet/rest/GreetingResourceTest.java"

  ui_tests:
    framework: "Appium 3.2.2"
    driver: "XCUITest 10.32.1"
    language: "Java"
    runner: "TestNG 7.10.2"
    appium_java_client: "9.3.0"
    selenium: "4.27.0"
    target_device: "iPhone 16 Pro / iOS 26.1"
    location: "appium/"

  api_integration_tests:
    framework: "Python pytest"
    language: "Python 3"
    dependencies: "Standard library only (no pip required)"
    runner: "pytest or direct python3 execution"
    examples:
      - "k8infra/test-login.py"
      - "k8infra/test-login-admin.py"

  test_running_tool:
    jmeter: "Load testing (API2.jmx)"
    version: "JMeter latest"
    threads: "10-300 (configurable)"
    ramp_up: "10-60 seconds"

---

# Unit Tests

unit_tests:

  dalogin_quarkus:
    test_class: "LoginFlowTest.java"
    location: "src/test/java/com/dalogin/LoginFlowTest.java"
    framework: "@QuarkusTest"
    dependencies_required:
      - "MySQL with login_ schema seeded"
      - "mbook service reachable at WILDFLY_URL (for admin test)"
    test_cases:
      - name: "testLoginSuccess"
        method: POST /login/HelloWorld
        inputs: "valid username, SHA3-512 password hash"
        expected: "200 OK, X-Token returned"

      - name: "testLoginBadHMAC"
        method: POST /login/HelloWorld
        inputs: "valid credentials, wrong HMAC signature"
        expected: "401 Unauthorized"

      - name: "testLoginWrongPassword"
        method: POST /login/HelloWorld
        inputs: "valid username, incorrect password hash"
        expected: "401 Unauthorized"

      - name: "testLoginMissingParams"
        method: POST /login/HelloWorld
        inputs: "missing deviceId parameter"
        expected: "400 Bad Request"

      - name: "testGetActiveSessions"
        method: GET /login/admin
        inputs: "Valid X-Token session header"
        expected: "200 OK, JSON array of active sessions"
        requires: "Session stored in context listener"

    configuration:
      db_url: "localhost:3306/login_"
      db_user: "sqluser"
      db_password: "sqlpw123"

    maven_command: "mvn test -f dalogin-quarkus/pom.xml"
    run_config: ".run/dalogin - package" (use IDE test runner)

  mbooks_quarkus:
    test_class: "GreetingResourceTest.java, GreetingResourceIT.java"
    location: "src/test/java/com/jeet/rest/"
    framework: "@QuarkusTest"
    test_cases:
      - name: "testHealthEndpoint"
        method: GET /q/health
        expected: "200 OK"

      - name: "testMetricsEndpoint"
        method: GET /q/metrics
        expected: "200 OK, Prometheus format"

    maven_command: "mvn test -f mbooks-quarkus/pom.xml"

  simple_service_webapp_quarkus:
    test_class: "ImageResourceTest.java"
    location: "src/test/java/com/simple/rest/"
    framework: "@QuarkusTest"
    test_cases:
      - name: "testHealthEndpoint"
        method: GET /q/health
        expected: "200 OK, 'Got it'"

      - name: "testMissingImageReturn404"
        method: GET /rest/images/nonexistent
        expected: "404 Not Found"

---

# Integration Tests (Python)

integration_tests:

  test_login_py:
    file: "k8infra/test-login.py"
    framework: "Python 3 (stdlib only)"
    purpose: "End-to-end HMAC login flow + user profile access"
    flow: |
      1. Read credentials from file or env
      2. Calculate HMAC-SHA512(body, secret)
      3. POST /login/HelloWorld with X-HMAC-HASH header
      4. Extract X-Token from response
      5. GET /mbook-1/rest/user/profile with X-Token
      6. Verify mbooks API accessible (/mbooks-1/rest/book/movies)

    prerequisites:
      - "Backend services deployed (dalogin, mbook, mbooks)"
      - "MySQL seeded with test users"
      - "HTTPS tunneling active (sudo minikube tunnel)"

    execution: "python3 k8infra/test-login.py"
    run_config: ".run/k8s - test-login.py"

  test_login_admin_py:
    file: "k8infra/test-login-admin.py"
    framework: "Python 3 (stdlib only)"
    purpose: "Admin endpoint test (active sessions retrieval)"
    flow: |
      1. Login with HMAC
      2. GET /login/admin (requires session)
      3. Verify active sessions returned
      4. Validate session structure

    prerequisites:
      - "Same as test-login.py"
      - "Context listener storing sessions (mboot-quarkus)"

    execution: "python3 k8infra/test-login-admin.py"
    run_config: ".run/k8s - test-login-admin.py"

---

# Appium iOS UI Tests

appium_tests:

  test_class: "TestNavigations.java"
  location: "appium/src/test/java/qa/ios/test/"
  framework: "TestNG 7.10.2"
  driver: "XCUITest 10.32.1 (Appium)"
  language: "Java"

  prerequisites:
    - "Xcode installed (macOS)"
    - "iOS simulator running (iPhone 16 Pro, iOS 26.1)"
    - "Appium server installed (npm install -g appium)"
    - "Backend services deployed"
    - "mysql seeded with test data"
    - "sudo minikube tunnel running"

  test_suite_flow:
    - name: "Navigate Movies"
      steps: |
        1. Launch SwiftCinemas app
        2. Verify Movies screen loads
        3. Scroll through movie list

    - name: "Select Movie & Venue"
      steps: |
        1. Click on a movie
        2. Verify venue options appear
        3. Select a cinema venue

    - name: "Select Screening Date"
      steps: |
        1. Verify date picker appears
        2. Select upcoming screening

    - name: "Interactive Seat Map"
      steps: |
        1. Verify seat map displays
        2. Click multiple seats (A1, B2, C3)
        3. Verify selection UI updates

    - name: "Proceed to Checkout"
      steps: |
        1. Click checkout button
        2. Verify Braintree Drop-in initializes

    - name: "Complete Payment"
      steps: |
        1. Enter test card details
        2. Submit payment
        3. Verify success response

  page_objects:
    location: "appium/src/main/java/qa/ios/pages/"
    classes:
      - "MoviesPage.java (movie grid selectors)"
      - "VenueSelectionPage.java (venue picker)"
      - "SeatMapPage.java (interactive seats)"
      - "CheckoutPage.java (Braintree form)"
      - "PurchaseHistoryPage.java (purchase list)"

  ui_inspection_tool:
    tool: "InspectUI"
    class: "qa.ios.util.InspectUI"
    runner: "testng-inspect.xml"
    purpose: "Dump page-source XML for selector debugging"
    command: "mvn test -f appium/pom.xml -DtestngXml=testng-inspect.xml"

  test_xml_builder:
    tool: "CreateXml Swing GUI"
    class: "qa.ios.util.CreateXml"
    purpose: "Interactive TestNG XML suite builder"
    launch: |
      mvn compile test-compile -f appium/pom.xml
      java -cp target/classes:target/test-classes:$(mvn dependency:build-classpath -q -Dmdep.outputFile=/dev/stdout) qa.ios.util.CreateXml
    window_config: "500x400 pixels, EXIT_ON_CLOSE"

  test_xml_files:
    testng_xml: "appium/testng.xml (main suite)"
    testng_inspect: "appium/testng-inspect.xml (InspectUI suite)"

  run_commands:
    maven_via_surefire: |
      mvn test -f appium/pom.xml -s k8infra/settings-local.xml
      (uses exec-maven-plugin, slower)

    java_direct_testng: |
      cd appium
      mvn dependency:build-classpath -Dmdep.outputFile=classpath.txt
      java -cp $(cat classpath.txt) org.testng.TestNG testng.xml
      (faster, bypasses Maven plugin overhead)

    ide_run_configs: |
      .run/appium - mvn test
      .run/appium - java direct (testng)
      .run/appium - CreateXml GUI

  environment:
    appium_port: 4723 (default)
    device_name: "iPhone 16 Pro"
    platform_version: "26.1"
    automation_name: "XCUITest"
    xcode_org_id: "(from Xcode settings)"
    xcode_signing_id: "(from Xcode settings)"

---

# Load Testing (JMeter)

load_testing:

  jmeter_plan:
    file: "API2.jmx"
    purpose: "Load test HMAC login + booking workflow"
    threads: "10-300 configurable"
    ramp_up_time: "10-60 seconds"
    duration: "5-10 minutes per test"

  test_scenarios:
    scenario_1_baseline:
      threads: 10
      ramp_up: 10
      duration: 300
      workload: "HMAC login + get movies list"

    scenario_2_medium:
      threads: 100
      ramp_up: 30
      duration: 600
      workload: "Login + venue selection + seat browsing"

    scenario_3_stress:
      threads: 300
      ramp_up: 60
      duration: 300
      workload: "Full booking flow (payment included)"
      note: "Use BeanShell processor to generate unique deviceIds"

  key_metrics:
    average_response_time: "< 500ms (95th percentile)"
    throughput: "TBD (depends on hardware)"
    error_rate: "< 0.1%"
    p95_latency: "< 1000ms"
    p99_latency: "< 2000ms"

  beanshell_processor:
    purpose: "Generate unique deviceIds per thread"
    script: |
      import java.util.UUID;
      vars.put("deviceId", UUID.randomUUID().toString());
    note: "Prevents all threads using same deviceId (seat lock contention)"

  execution:
    gui_mode: "jmeter -t API2.jmx"
    headless_mode: "jmeter -n -t API2.jmx -l results.jtl -j jmeter.log"
    results_viewer: "jmeter -g results.jtl -o results-report/"

---

# Test Configuration Files

test_configs:

  testng_xml:
    file: "appium/testng.xml"
    structure: |
      <suite name="Cinemas iOS Tests">
        <test name="Booking Flow">
          <classes>
            <class name="qa.ios.test.TestNavigations" />
          </classes>
        </test>
      </suite>
    ordering: "INSTANCE (tests run in definition order)"

  testng_inspect_xml:
    file: "appium/testng-inspect.xml"
    purpose: "InspectUI runner for page-source debugging"
    structure: |
      <suite name="Inspect UI">
        <test name="Page Source Dump">
          <classes>
            <class name="qa.ios.util.InspectUI" />
          </classes>
        </test>
      </suite>

  pom_xml_appium:
    file: "appium/pom.xml"
    key_sections:
      - "java.version: 17"
      - "appium-java-client: 9.3.0"
      - "selenium-webdriver: 4.27.0"
      - "testng: 7.10.2"
      - "maven-shade-plugin: uber JAR for CreateXml"
      - "exec-maven-plugin: java direct runner"

  run_configurations:
    .run_directory: ".run/ (version-controlled)"
    example_configs:
      - "appium - mvn test.xml"
      - "appium - java direct (testng).xml"
      - "appium - CreateXml GUI.xml"

