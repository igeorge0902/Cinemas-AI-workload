<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movies Prototype</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: #fff;
        }

        .container {
            max-width: 420px;
            margin: auto;
            padding: 16px;
        }

        .header {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 16px;
        }

        .search {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            color: #888;
        }

        /* Horizontal scroll chips */
        .chips {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 8px;
            margin-bottom: 16px;
            scrollbar-width: none;
        }

        .chips::-webkit-scrollbar {
            display: none;
        }

        .chip {
            background: #1a1a1a;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 12px;
            color: #ccc;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .card {
            background: #111;
            border-radius: 16px;
            padding: 8px;
            position: relative;
        }

        .poster {
            width: 100%;
            height: 180px;
            background: #222;
            border-radius: 12px;
        }

        .rating {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0,0,0,0.7);
            padding: 4px 6px;
            border-radius: 8px;
            font-size: 12px;
        }

        .favorite {
            position: absolute;
            top: 8px;
            right: 8px;
            cursor: pointer;
        }

        .title {
            font-size: 14px;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">Discover Movies</div>

    <div class="search">Search movies...</div>

    <!-- Scrollable categories -->
    <div class="chips">
        <div class="chip">Action</div>
        <div class="chip">Drama</div>
        <div class="chip">Sci-Fi</div>
        <div class="chip">Thriller</div>
        <div class="chip">Comedy</div>
        <div class="chip">Fantasy</div>
        <div class="chip">Animation</div>
        <div class="chip">Horror</div>
    </div>

    <div class="grid">

        <!-- Repeat cards to simulate more content -->
        <!-- Card template -->
        <script>
            const movies = [
                {title: "Invasion", rating: "7.9"},
                {title: "Bleach", rating: "8.4"},
                {title: "Miraculous", rating: "8.0"},
                {title: "Walking Dead", rating: "8.1"},
                {title: "Dune", rating: "8.3"},
                {title: "Matrix", rating: "8.7"},
                {title: "Interstellar", rating: "8.6"},
                {title: "Joker", rating: "8.5"}
            ];

            document.write(movies.map(m => `
                <div class="card">
                    <div class="poster"></div>
                    <div class="rating">★ ${m.rating}</div>
                    <div class="favorite" onclick="toggleFav(this)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                            <path d="M12 21s-6-4.35-9-8.28C-1 6.5 3.5 2 7.5 5.5L12 10l4.5-4.5C20.5 2 25 6.5 21 12.72 18 16.65 12 21 12 21z"
                                  stroke="white" stroke-width="1.5"/>
                        </svg>
                    </div>
                    <div class="title">${m.title}</div>
                </div>
            `).join(""));
        </script>

    </div>
</div>

<script>
    function toggleFav(el) {
        const path = el.querySelector("path");
        const filled = path.getAttribute("fill") === "white";
        path.setAttribute("fill", filled ? "none" : "white");
    }
</script>

</body>
</html>
